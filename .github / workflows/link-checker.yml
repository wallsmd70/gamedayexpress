name: Weekly Dead Link Checker

on:
  schedule:
    # This cron schedule runs the script automatically every Sunday at midnight UTC
    - cron: '0 0 * * 0' 
  workflow_dispatch: 
    # This allows you to click a "Run workflow" button in GitHub to test it manually anytime

jobs:
  check-links:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Grab your repository's code
    - name: Checkout Code
      uses: actions/checkout@v4
      
    # Step 2: Setup the Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    # Step 3: Install the required libraries (requests and beautifulsoup4)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    # Step 4: Run the link checker script
    - name: Run Link Checker
      run: python check_links.py

